<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <style>
    /* ----- تصميم Mobile First حديث وداعم للهواتف ----- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      direction: rtl;
    }

    .login-container {
      background-color: #ffffff;
      width: 100%;
      max-width: 400px; 
      padding: 2.5rem 1.5rem;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
      box-sizing: border-box;
      margin: 1.5rem;
    }

    h1 {
      color: #1a73e8;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }

    p.subtitle {
      color: #5f6368;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    /* تنسيق الحاوية التي تظهر بعد تسجيل الدخول */
    #user-profile {
      display: none; /* مخفية في البداية */
      margin-top: 1.5rem;
      padding: 1.5rem;
      background-color: #f8f9fa;
      border-radius: 12px;
      border: 1px solid #e8eaed;
    }

    #user-profile img {
      border-radius: 50%;
      width: 80px;
      height: 80px;
      margin-bottom: 12px;
      border: 3px solid #1a73e8;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    #user-name {
      color: #202124;
      margin: 10px 0 5px 0;
      font-size: 1.2rem;
    }

    #user-email {
      margin: 0; 
      font-size: 0.9rem; 
      color: #5f6368;
    }

    /* رسائل حالة الاتصال بالسيرفر */
    #server-msg {
      margin-top: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 12px;
      border-radius: 8px;
    }

    .loading { color: #b06000; background-color: #fef7e0; border: 1px solid #fde293;}
    .success { color: #0d652d; background-color: #e6f4ea; border: 1px solid #ceead6;}
    .error { color: #a50e0e; background-color: #fce8e6; border: 1px solid #fad2cf;}

    /* استجابة للشاشات الأكبر */
    @media (min-width: 600px) {
      .login-container { padding: 3rem 2.5rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
  
  <!-- مكتبة تسجيل الدخول الرسمية من جوجل -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div class="login-container">
    <h1>مرحباً بك مجدداً</h1>
    <p class="subtitle">يرجى تسجيل الدخول باستخدام حساب جوجل للمتابعة</p>

    <!-- قسم زر تسجيل الدخول -->
    <div class="btn-container" id="login-section">
      <!-- الكود الخاص بك الذي حصلت عليه من Google Cloud -->
      <div id="g_id_onload"
           data-client_id="396199299163-j7q2r627vdp8aro2fuqimmhenu55p0qj.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <!-- شكل زر جوجل -->
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-text="sign_in_with"
           data-shape="pill"
           data-logo_alignment="left">
      </div>
    </div>

    <!-- قسم الملف الشخصي (يظهر بعد نجاح الدخول) -->
    <div id="user-profile">
      <img id="user-img" src="" alt="صورة المستخدم">
      <h3 id="user-name"></h3>
      <p id="user-email"></p>
      <div id="server-msg" class="loading">جاري إرسال البيانات إلى السيرفر...</div>
    </div>
  </div>

  <script>
    // رابط الـ Backend الخاص بك في Google Apps Script
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbw7aMlxpnSz_FAMTaC7R2SRdJ7It_XkM-iiCtRRwbDLvR2UQvOt3KPaKmmvzm0pL1GvOA/exec";

    // دالة لفك تشفير بيانات جوجل واستخراج الاسم والصورة والإيميل
    function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    // الدالة التي تعمل تلقائياً عند نجاح تسجيل الدخول
    function handleCredentialResponse(response) {
      // 1. استخراج بيانات المستخدم
      const responsePayload = parseJwt(response.credential);

      // 2. تحديث الواجهة (إخفاء الزر وإظهار بيانات المستخدم)
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('user-profile').style.display = 'block';
      document.getElementById('user-img').src = responsePayload.picture;
      document.getElementById('user-name').innerText = responsePayload.name;
      document.getElementById('user-email').innerText = responsePayload.email;
      
      const serverMsgDiv = document.getElementById('server-msg');

      // 3. إرسال البيانات إلى Google Apps Script
      fetch(BACKEND_URL, {
        method: 'POST',
        // نستخدم text/plain لتجنب مشاكل الـ CORS مع جوجل
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({
          name: responsePayload.name,
          email: responsePayload.email
        })
      })
      .then(response => response.json())
      .then(data => {
        // في حال نجاح السيرفر في استلام البيانات
        if(data.status === "success") {
          serverMsgDiv.className = "success";
          serverMsgDiv.innerText = "تم تسجيل الدخول وحفظ بياناتك بنجاح ✅";
        } else {
          // في حال رد السيرفر بخطأ
          serverMsgDiv.className = "error";
          serverMsgDiv.innerText = "حدث خطأ في السيرفر: " + data.message;
        }
      })
      .catch(error => {
        // في حال فشل الاتصال بالرابط تماماً
        serverMsgDiv.className = "error";
        serverMsgDiv.innerText = "حدث خطأ أثناء إرسال البيانات للسيرفر. تأكد من أن السكربت منشور كـ Anyone.";
        console.error('Error fetching backend:', error);
      });
    }
  </script>
</body>
</html>
